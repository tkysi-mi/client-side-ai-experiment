<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chrome AI APIを使用したリアルタイム英日音声翻訳アプリケーション。完全ローカル処理でプライバシーを保護。">
    <meta name="theme-color" content="#10b981">
    <title>リアルタイム英日音声翻訳</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ========== メインコンテナ ========== -->
    <main class="container">
        <!-- ========== ヘッダーセクション ========== -->
        <header>
            <h1>リアルタイム英日音声翻訳</h1>
            <p class="subtitle">Chrome Prompt APIを使用したローカルでのリアルタイム音声翻訳デモ</p>
        </header>

        <!-- ========== アプリケーション情報 ========== -->
        <section class="app-info" aria-label="アプリケーション情報">
            <p class="app-info-subtitle">🔒 完全ローカル処理 | 🤖 Gemini Nano使用</p>

            <div class="collapsible-section">
                <button class="collapsible-header" id="usage-toggle" aria-expanded="false" aria-controls="usage-content">
                    <span class="collapsible-icon" aria-hidden="true">▶</span>
                    <span>使い方を表示</span>
                </button>
                <div class="collapsible-content" id="usage-content">
                    <div class="usage-guide usage-guide-first">
                        <h4 class="usage-guide-title">⚙️ 初回セットアップ（1回のみ）</h4>
                        <div class="usage-steps">
                            <span class="usage-step">「AIモデルを準備する」ボタンをクリック</span>
                            <span class="usage-arrow" aria-hidden="true">→</span>
                            <span class="usage-step">AIモデルのダウンロード</span>
                        </div>
                        <p class="usage-guide-note">※ 初回利用時は数分かかる場合があります</p>
                    </div>

                    <div class="usage-guide">
                        <h4 class="usage-guide-title">📋 使い方</h4>
                        <div class="usage-steps">
                            <span class="usage-step">「音声認識を開始」をクリック</span>
                            <span class="usage-arrow" aria-hidden="true">→</span>
                            <span class="usage-step">英語で話す</span>
                            <span class="usage-arrow" aria-hidden="true">→</span>
                            <span class="usage-step">リアルタイム翻訳を確認</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="section-divider" role="separator"></div>

        <!-- ========== 警告メッセージエリア ========== -->
        <div id="warning" class="warning-message hidden" role="alert" aria-live="polite">
            ⚠️ <span id="warning-text"></span>
        </div>

        <!-- ========== ステータスバー ========== -->
        <aside class="status-bar" aria-label="システム状態">
            <div class="status-item">
                <div class="status-label">Chrome AI API</div>
                <div id="ai-status" class="status-value inactive" role="status" aria-live="polite">未確認</div>
            </div>
            <div class="status-item">
                <div class="status-label">音声認識</div>
                <div id="speech-status" class="status-value inactive" role="status" aria-live="polite">待機中</div>
            </div>
            <div class="status-item">
                <div class="status-label">AI モデル</div>
                <div id="model-status" class="status-value inactive" role="status" aria-live="polite">未読込</div>
            </div>
        </aside>

        <!-- AIモデル初期化ボタン -->
        <button id="initialize-model-button" class="start-btn init-model-btn hidden" aria-label="AIモデルを準備する">
            AIモデルを準備する
        </button>

        <!-- ========== コントロールパネル ========== -->
        <nav class="control-panel" aria-label="音声認識コントロール">
            <button id="startBtn" class="start-btn" aria-label="音声認識を開始">音声認識を開始</button>
            <button id="stopBtn" class="stop-btn" disabled aria-label="音声認識を停止">停止</button>
            <button id="clearBtn" class="clear-btn" aria-label="翻訳履歴をクリア">履歴をクリア</button>
        </nav>

        <!-- ========== 翻訳表示エリア ========== -->
        <section class="translation-area" aria-label="翻訳結果">
            <article class="translation-box">
                <div class="translation-label">
                    <span class="language-indicator" aria-label="英語">English</span>
                    音声認識
                </div>
                <div id="englishText" class="translation-content" role="log" aria-live="polite" aria-atomic="false"></div>
            </article>
            <article class="translation-box">
                <div class="translation-label">
                    <span class="language-indicator" aria-label="日本語">日本語</span>
                    AI翻訳
                    <span id="translationLoader" class="loading-indicator hidden" role="status" aria-label="翻訳中"></span>
                </div>
                <div id="japaneseText" class="translation-content" role="log" aria-live="polite" aria-atomic="false"></div>
            </article>
        </section>

        <!-- ========== 翻訳履歴セクション ========== -->
        <section class="history-section" aria-label="翻訳履歴">
            <h2 class="history-title">📝 翻訳履歴</h2>
            <div id="history" role="feed" aria-busy="false"></div>
        </section>
    </main>

    <!-- ========== JavaScript ========== -->
    <script src="js/app.js"></script>
</body>
</html>
